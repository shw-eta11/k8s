apiVersion: apps/v1
kind: Deployment
metadata:
  name: database
  namespace: frontend-namespace
spec:
  replicas: 1
  selector:
    matchLabels:
      app: database
  template:
    metadata:
      labels:
        app: database
    spec:
      containers:
        - name: database
          image: mysql:latest
          env:
            - name: MYSQL_ROOT_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: mysql-secret
                  key: MYSQL_ROOT_PASSWORD
          ports:
            - containerPort: 3306

          volumeMounts:
            - name: database-storage
              mountPath: /var/lib/mysql
             

      volumes:
        - name: database-storage
          persistentVolumeClaim:
            claimName: database-pvc
        
               

          