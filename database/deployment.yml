apiVersion: apps/v1
kind: Deployment
metadata:
  name: database
  namespace: frontend-namespace
spec:
  replicas: 2
  selector:
    matchLabels:
      app: database
  template:
    metadata:
      labels:
        app: database
    spec:
      containers:
        - name: database
          image: mysql:latest
          ports:
            - containerPort: 3306

          