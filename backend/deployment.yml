apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend-deployment
  namespace: frontend-namespace
spec:
  replicas: 3
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      labels:
        app: backend
    spec:
      containers:
      - name: backend-container
        image: shweta0/backend
        ports:
        - containerPort: 4000
